<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperlinks Example</title>
</head>
<body>

    <h1>Learning HTML Hyperlinks</h1>

    <p>
        <!-- Standard link that opens in the same tab -->
        Visit the official <a href="https://www.wikipedia.org">Wikipedia website</a> to search for information.
    </p>

    <p>
        <!-- Link that opens in a new tab using target="_blank" -->
        You can also open <a href="https://www.google.com" target="_blank">Google Search</a> in a brand new tab.
    </p>

</body>
</html>
