<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Table Example</title>
</head>
<body>

    <h1>Student Grades Table</h1>

    <!-- The <table> tag defines the structure of the table -->
    <table border="1">
        <!-- tr stands for Table Row -->
        <tr>
            <!-- th stands for Table Header (Bold and centered by default) -->
            <th>Roll No.</th>
            <th>Name</th>
            <th>Subject</th>
            <th>Grade</th>
        </tr>
        <tr>
            <!-- td stands for Table Data (Standard cell content) -->
            <td>101</td>
            <td>John Doe</td>
            <td>HTML Fundamentals</td>
            <td>A+</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Jane Smith</td>
            <td>Web Design</td>
            <td>A</td>
        </tr>
        <tr>
            <td>103</td>
            <td>Alex Jones</td>
            <td>Computer Science</td>
            <td>B+</td>
        </tr>
    </table>

</body>
</html>
