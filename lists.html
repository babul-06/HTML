<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Lists Example</title>
</head>
<body>

    <h1>Learning HTML Lists</h1>

    <!-- 1. Unordered List (Bulleted) -->
    <h2>My Favorite Fruits (Unordered List)</h2>
    <ul>
        <li>Mango</li>
        <li>Apple</li>
        <li>Banana</li>
        <li>Strawberry</li>
    </ul>

    <!-- 2. Ordered List (Numbered) -->
    <h2>Steps to Make Tea (Ordered List)</h2>
    <ol>
        <li>Boil water in a pot.</li>
        <li>Add tea leaves or a tea bag.</li>
        <li>Pour in milk and sugar if desired.</li>
        <li>Strain and serve hot.</li>
    </ol>

</body>
</html>
