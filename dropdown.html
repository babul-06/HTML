<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Dropdown Example</title>
</head>
<body>

    <h1>Select Your Favorite Course</h1>
    
    <form action="#" method="POST">
        
        <!-- The label pairs with the select dropdown -->
        <label for="courses">Choose a course from the list:</label>
        
        <!-- The <select> tag creates the dropdown menu -->
        <select id="courses" name="course_selection">
            <!-- <option> tags define the choices inside the menu -->
            <option value="html">HTML Fundamentals</option>
            <option value="css">Advanced CSS</option>
            <option value="javascript">JavaScript Programming</option>
            <option value="python">Python for Beginners</option>
        </select>

        <br><br>

        <button type="submit">Submit Choice</button>

    </form>

</body>
</html>
