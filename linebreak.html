<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Line Break in HTML</title>
</head>
<body>

    <h1>Line Break Example</h1>
    
    <!-- The <br> tag inserts a single line break without starting a new paragraph -->
    <p>This is the first line of text.<br>And this text will appear right below it on a new line.</p>

</body>
</html>
