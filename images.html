<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Image Example</title>
</head>
<body>

    <h1>Adding Images in HTML</h1>

    <!-- 
      The <img> tag embeds an image.
      - src: The URL or file path of the image.
      - alt: Alternate text displayed if the image fails to load (and for accessibility).
      - width/height: Optional attributes to change the image size.
    -->
    <h3>Example 1: Displaying a Web Image</h3>
    <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713" alt="Coding Screen" width="500">

    <h3>Example 2: Resized Image with Descriptive Alt Text</h3>
    <img src="https://images.unsplash.com/photo-1510915228340-29c85a43dcfe" alt="Developer working" width="300" height="200">

</body>
</html>
