<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comments in HTML</title>
</head>
<body>

    <!-- This is a single-line comment in HTML. It won't be displayed in the browser! -->
    <h1>Learning HTML Comments</h1>

    <!-- 
      This is a multi-line comment.
      You can use it to explain large blocks of code
      or temporarily disable parts of your HTML.
    -->
    <p>Check the source code to see the comments.</p>

</body>
</html>
