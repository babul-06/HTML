<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Iframe Example</title>
</head>
<body>

    <h1>Embedding Content with Iframes</h1>

    <!-- 
      The <iframe> tag embeds another webpage.
      - src: The URL of the page you want to display.
      - width/height: Sets the size of the iframe window.
      - title: Highly recommended for accessibility (screen readers).
    -->
    <h3>Example 1: Embedding Wikipedia</h3>
    <iframe src="https://en.wikipedia.org/wiki/Main_Page" width="100%" height="400" title="Wikipedia Main Page">
        Your browser does not support iframes.
    </iframe>

    <hr>

    <h3>Example 2: Embedding a Map or Video Frame</h3>
    <!-- You can restrict the width and height using absolute pixel values -->
    <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=-0.00401%2C51.47612%2C0.00066%2C51.47833&amp;layer=mapnik" width="400" height="300" title="Greenwich Map">
    </iframe>

</body>
</html>
